<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissAV Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #0f172a;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 64px;
            background: #f1f5f9;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 12px;
            flex-shrink: 0;
        }
        .sidebar-logo {
            color: #3b82f6;
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 12px;
        }
        .sidebar-btn {
            width: 42px; height: 42px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.15s;
            background: #e2e8f0;
            color: #64748b;
        }
        .sidebar-btn.active {
            background: #3b82f6;
            color: #ffffff;
        }
        .sidebar-btn:hover:not(.active) {
            background: #cbd5e1;
        }

        /* --- Main content --- */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }
        .page { display: none; }
        .page.active { display: block; }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .page-subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 24px;
        }

        /* --- URL Input --- */
        .url-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .url-bar input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.15s;
        }
        .url-bar input:focus { border-color: #3b82f6; }
        .url-bar button {
            padding: 12px 28px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .url-bar button:hover { background: #2563eb; }

        /* --- Stats badges --- */
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-badge {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }
        .stat-downloading { background: #eff6ff; color: #3b82f6; }
        .stat-done { background: #f0fdf4; color: #16a34a; }
        .stat-waiting { background: #fef3c7; color: #d97706; }
        .stat-error { background: #fef2f2; color: #ef4444; }

        /* --- Task card --- */
        .task-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
            transition: border-color 0.15s;
        }
        .task-card.done { background: #f0fdf4; border-color: #bbf7d0; }
        .task-card.error { background: #fef2f2; border-color: #fecaca; }
        .task-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .task-title {
            font-size: 14px;
            font-weight: 500;
            word-break: break-all;
            flex: 1;
        }
        .task-meta {
            color: #94a3b8;
            font-size: 11px;
            margin-top: 4px;
        }
        .task-actions { display: flex; gap: 6px; flex-shrink: 0; }

        /* --- Progress bar --- */
        .progress-wrap { margin-top: 10px; }
        .progress-bg {
            background: #e2e8f0;
            border-radius: 6px;
            height: 5px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            height: 100%;
            border-radius: 6px;
            transition: width 0.4s ease;
        }
        .progress-text {
            color: #94a3b8;
            font-size: 11px;
            margin-top: 4px;
        }

        /* --- Buttons --- */
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #dbeafe; color: #2563eb; }
        .btn-danger { background: #fef2f2; color: #ef4444; }
        .btn-ghost { background: #f1f5f9; color: #94a3b8; }
        .btn-preview { background: #f0f9ff; color: #3b82f6; }

        /* --- File manager --- */
        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .files-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-input {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 12px;
            background: #f8fafc;
            outline: none;
            width: 180px;
        }
        .search-input:focus { border-color: #3b82f6; }
        .sort-select {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 12px;
            background: #f8fafc;
            cursor: pointer;
            outline: none;
        }

        .file-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        .file-icon {
            width: 40px; height: 40px;
            background: #e2e8f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .file-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-meta {
            color: #94a3b8;
            font-size: 11px;
            margin-top: 2px;
        }
        .file-actions { display: flex; gap: 6px; flex-shrink: 0; }

        /* --- Video modal --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #0f172a;
            border-radius: 12px;
            overflow: hidden;
            width: 90vw;
            max-width: 960px;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            width: 32px; height: 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            z-index: 10;
        }
        .modal-close:hover { background: rgba(255,255,255,0.25); }
        .modal-content video {
            width: 100%;
            display: block;
            max-height: 80vh;
        }

        /* --- Message toast --- */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateY(-8px);
            transition: all 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .toast.error { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }

        /* --- Settings --- */
        .settings-form {
            max-width: 560px;
        }
        .setting-group {
            margin-bottom: 24px;
        }
        .setting-label {
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }
        .setting-desc {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .setting-input {
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background: #f8fafc;
            outline: none;
            width: 120px;
            transition: border-color 0.15s;
        }
        .setting-input:focus { border-color: #3b82f6; }
        .setting-input-wide {
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
            background: #f8fafc;
            outline: none;
            width: 100%;
            transition: border-color 0.15s;
        }
        .setting-input-wide:focus { border-color: #3b82f6; }
        .setting-select {
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background: #f8fafc;
            outline: none;
            cursor: pointer;
            min-width: 200px;
        }
        .setting-textarea {
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
            background: #f8fafc;
            outline: none;
            width: 100%;
            resize: vertical;
            transition: border-color 0.15s;
        }
        .setting-textarea:focus { border-color: #3b82f6; }

        /* Toggle switch */
        .toggle {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .toggle input { display: none; }
        .toggle-slider {
            width: 44px; height: 24px;
            background: #cbd5e1;
            border-radius: 12px;
            position: relative;
            transition: background 0.2s;
        }
        .toggle-slider::after {
            content: '';
            width: 18px; height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 3px; left: 3px;
            transition: transform 0.2s;
        }
        .toggle input:checked + .toggle-slider {
            background: #3b82f6;
        }
        .toggle input:checked + .toggle-slider::after {
            transform: translateX(20px);
        }
        .toggle-text {
            font-size: 13px;
            color: #64748b;
        }

        .setting-actions {
            display: flex;
            gap: 10px;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        .btn-save {
            padding: 10px 28px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-save:hover { background: #2563eb; }
        .btn-reset {
            padding: 10px 20px;
            background: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-reset:hover { background: #e2e8f0; }

        /* --- Empty state --- */
        .empty {
            text-align: center;
            padding: 48px 0;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-logo">M</div>
        <button class="sidebar-btn active" data-page="download" title="다운로드">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

        </button>
        <div style="flex:1"></div>
        <button class="sidebar-btn" data-page="settings" title="설정">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>

    </nav>

    <!-- Main content -->
    <div class="main">
        <!-- Download Page -->
        <div id="page-download" class="page active">
            <div class="page-title">다운로드</div>
            <div class="page-subtitle">MissAV URL을 입력하면 서버에서 다운로드합니다</div>

            <form id="downloadForm" class="url-bar">
                <input type="text" id="url" placeholder="https://missav.ws/ko/..." required>
                <button type="submit">추가</button>
            </form>

            <div class="stats" id="stats"></div>
            <div id="taskList"></div>
        </div>

        <!-- Files Page -->
        <div id="page-files" class="page">
            <div class="files-header">
                <div>
                    <div class="page-title">파일 관리</div>
                    <div class="page-subtitle" id="filesSummary">서버에 저장된 파일</div>
                </div>
                <div class="files-controls">
                    <input class="search-input" id="fileSearch" type="text" placeholder="검색...">
                    <select class="sort-select" id="fileSort">
                        <option value="date">날짜순</option>
                        <option value="name">이름순</option>

                </div>
            </div>
            <div id="fileList"></div>

        <!-- Settings Page -->
        <div id="page-settings" class="page">
            <div class="page-title">설정</div>
            <div class="page-subtitle">다운로드 및 시스템 설정을 관리합니다</div>

            <div class="settings-form">
                <div class="setting-group">
                    <label class="setting-label">동시 다운로드 수</label>
                    <div class="setting-desc">서버에서 동시에 진행할 최대 다운로드 수 (변경 시 재시작 필요)</div>
                    <input type="number" id="set-max-concurrent" class="setting-input" min="1" max="8" value="4">
                </div>

                <div class="setting-group">
                    <label class="setting-label">파일명 템플릿</label>
                    <div class="setting-desc">yt-dlp 파일명 형식. %(id)s=영상ID, %(title)s=제목, .60s=60자 제한</div>

                <div class="setting-group">

                    <label class="toggle">
                        <input type="checkbox" id="set-spoofdpi" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-text" id="spoofdpi-text">활성</span>
                    </label>
                </div>

                <div class="setting-group">
                    <label class="setting-label">영상 화질</label>
                    <div class="setting-desc">다운로드할 최대 해상도</div>
                    <select id="set-quality" class="setting-select">
                        <option value="best">최고 화질 (best)</option>
                        <option value="1080">1080p</option>
                        <option value="720">720p</option>
                        <option value="480">480p</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label class="setting-label">미러 도메인 목록</label>
                    <div class="setting-desc">missav 미러 도메인 (줄바꿈으로 구분)</div>
                    <textarea id="set-mirrors" class="setting-textarea" rows="5">missav.ai
missav.net
missav123.com
missav.com
missav.ws</textarea>
                </div>

                <div class="setting-actions">
                    <button class="btn-save" id="saveSettings">저장</button>
                    <button class="btn-reset" id="resetSettings">기본값 복원</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Video preview modal -->
    <div class="modal-overlay" id="videoModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <video id="videoPlayer" controls></video>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    // --- Utility ---
    function formatSize(bytes) {
        if (bytes >= 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
        if (bytes >= 1e6) return (bytes / 1e6).toFixed(1) + ' MB';
        if (bytes >= 1e3) return (bytes / 1e3).toFixed(1) + ' KB';
        return bytes + ' B';
    }
    function formatDate(ts) {
        const d = new Date(ts * 1000);
        return d.toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    }
    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast ' + type + ' show';
        setTimeout(() => t.classList.remove('show'), 2500);
    }
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // --- SPA Routing ---
    document.querySelectorAll('.sidebar-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('page-' + btn.dataset.page).classList.add('active');
            if (btn.dataset.page === 'files') fetchFiles();
            if (btn.dataset.page === 'settings') loadSettingsUI();
        });
    });

    // --- Download Form ---
    document.getElementById('downloadForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const urlInput = document.getElementById('url');
        const url = urlInput.value.trim();
        if (!url) return;
        fetch('/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ url })
        })
        .then(r => r.json())
        .then(data => {
            showToast(data.message, data.status === 'success' ? 'success' : 'error');
            urlInput.value = '';
            fetchTasks();
        });
    });

    // --- Tasks ---
    function fetchTasks() {
        fetch('/api/tasks').then(r => r.json()).then(tasks => {
            const entries = Object.entries(tasks).reverse();
            let downloading = 0, done = 0, waiting = 0, errors = 0;
            entries.forEach(([, t]) => {
                if (t.status.includes('다운로드')) downloading++;
                else if (t.status.includes('완료')) done++;
                else if (t.status.includes('대기')) waiting++;
                else if (t.status.includes('에러')) errors++;
            });

            const statsEl = document.getElementById('stats');
            let statsHtml = '';
            if (downloading) statsHtml += '<span class="stat-badge stat-downloading">\u2193 진행 ' + downloading + '</span>';
            if (done) statsHtml += '<span class="stat-badge stat-done">\u2713 완료 ' + done + '</span>';
            if (waiting) statsHtml += '<span class="stat-badge stat-waiting">\u23f3 대기 ' + waiting + '</span>';
            if (errors) statsHtml += '<span class="stat-badge stat-error">\u2715 에러 ' + errors + '</span>';
            statsEl.innerHTML = statsHtml;

            const listEl = document.getElementById('taskList');
            if (entries.length === 0) {
                listEl.innerHTML = '<div class="empty">다운로드 목록이 비어있습니다</div>';
                return;
            }
            listEl.innerHTML = entries.map(([id, t]) => {
                let cls = '';
                if (t.status.includes('완료')) cls = 'done';
                else if (t.status.includes('에러')) cls = 'error';

                let progressHtml = '';
                if (t.status === '다운로드 중') {
                    const pct = t.progress || '0%';
                    progressHtml =
                        '<div class="progress-wrap">' +
                            '<div class="progress-bg"><div class="progress-fill" style="width:' + pct + '"></div></div>' +
                            '<div class="progress-text">' + escapeHtml(pct) + '</div>' +
                        '</div>';
                }

                let actions = '';
                if (t.status === '다운로드 중') {
                    actions = '<button class="btn btn-danger" onclick="deleteTask(\'' + id + '\')">취소</button>';
                } else if (t.status.includes('완료') && t.filename) {
                    actions =
                        '<a class="btn btn-primary" href="/api/files/' + encodeURIComponent(t.filename) + '/download" style="text-decoration:none">\u2193 받기</a>' +
                        '<button class="btn btn-ghost" onclick="deleteTask(\'' + id + '\')">\u2715</button>';
                } else {
                    actions = '<button class="btn btn-ghost" onclick="deleteTask(\'' + id + '\')">\u2715</button>';
                }

                const titleText = escapeHtml(t.filename || t.url);
                const metaText = t.status.includes('완료') && t.filesize
                    ? formatSize(t.filesize) + ' \u00b7 완료'
                    : escapeHtml(t.status);

                return '<div class="task-card ' + cls + '">' +
                    '<div class="task-top">' +
                        '<div style="flex:1;min-width:0">' +
                            '<div class="task-title">' + titleText + '</div>' +
                            '<div class="task-meta">' + metaText + '</div>' +
                        '</div>' +
                        '<div class="task-actions">' + actions + '</div>' +
                    '</div>' +
                    progressHtml +
                '</div>';
            }).join('');
        });
    }

    function deleteTask(id) {
        fetch('/api/tasks/' + id, { method: 'DELETE' }).then(() => fetchTasks());
    }

    setInterval(fetchTasks, 1500);
    fetchTasks();

    // --- Files ---
    let allFiles = [];

    function fetchFiles() {
        fetch('/api/files').then(r => r.json()).then(files => {
            allFiles = files;
            renderFiles();
        });
    }

    function renderFiles() {
        let files = allFiles.slice();
        const query = document.getElementById('fileSearch').value.toLowerCase();
        if (query) files = files.filter(f => f.name.toLowerCase().includes(query));

        const sort = document.getElementById('fileSort').value;
        if (sort === 'name') files.sort((a, b) => a.name.localeCompare(b.name));
        else if (sort === 'size') files.sort((a, b) => b.size - a.size);
        else files.sort((a, b) => b.modified - a.modified);

        const totalSize = allFiles.reduce((s, f) => s + f.size, 0);
        document.getElementById('filesSummary').textContent =
            '서버에 저장된 파일 ' + allFiles.length + '개 \u00b7 ' + formatSize(totalSize);

        const listEl = document.getElementById('fileList');
        if (files.length === 0) {
            listEl.innerHTML = '<div class="empty">파일이 없습니다</div>';
            return;
        }
        listEl.innerHTML = files.map(f => {
            const encodedName = encodeURIComponent(f.name);
            return '<div class="file-card">' +
                '<div class="file-info">' +
                    '<div class="file-icon">\uD83C\uDFAC</div>' +
                    '<div style="min-width:0">' +
                        '<div class="file-name" title="' + escapeHtml(f.name) + '">' + escapeHtml(f.name) + '</div>' +
                        '<div class="file-meta">' + formatSize(f.size) + ' \u00b7 ' + formatDate(f.modified) + '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="file-actions">' +
                    '<button class="btn btn-preview" onclick="previewFile(\'' + encodedName + '\')">\u25b6 미리보기</button>' +
                    '<a class="btn btn-primary" href="/api/files/' + encodedName + '/download" style="text-decoration:none">\u2193 다운로드</a>' +
                    '<button class="btn btn-danger" onclick="deleteFile(\'' + encodedName + '\')">삭제</button>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    document.getElementById('fileSearch').addEventListener('input', renderFiles);
    document.getElementById('fileSort').addEventListener('change', renderFiles);

    function deleteFile(name) {
        if (!confirm('서버에서 파일을 삭제하시겠습니까?')) return;
        fetch('/api/files/' + name, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
            showToast(data.message, data.status === 'success' ? 'success' : 'error');
            fetchFiles();
        });
    }

    // --- Video Modal ---
    function previewFile(name) {
        const player = document.getElementById('videoPlayer');
        player.src = '/api/files/' + name + '/stream';
        document.getElementById('videoModal').classList.add('active');
        player.play();
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('videoModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    function closeModal() {
        const player = document.getElementById('videoPlayer');
        player.pause();
        player.src = '';
        document.getElementById('videoModal').classList.remove('active');
    }

    // --- Settings ---
    const defaultSettings = {
        max_concurrent: 4,
        filename_template: '[%(id)s] %(title).60s.%(ext)s',
        spoofdpi_enabled: true,
        video_quality: 'best',
        mirrors: ['missav.ai', 'missav.net', 'missav123.com', 'missav.com', 'missav.ws']
    };

    function loadSettingsUI() {
        fetch('/api/settings').then(r => r.json()).then(s => {
            document.getElementById('set-max-concurrent').value = s.max_concurrent || 4;
            document.getElementById('set-filename-template').value = s.filename_template || defaultSettings.filename_template;
            document.getElementById('set-spoofdpi').checked = s.spoofdpi_enabled !== false;
            document.getElementById('set-quality').value = s.video_quality || 'best';
            document.getElementById('set-mirrors').value = (s.mirrors || defaultSettings.mirrors).join('\n');
            updateToggleText();
        });
    }

    function updateToggleText() {
        var checked = document.getElementById('set-spoofdpi').checked;
        document.getElementById('spoofdpi-text').textContent = checked ? '활성' : '비활성';
    }

    document.getElementById('set-spoofdpi').addEventListener('change', updateToggleText);

    document.getElementById('saveSettings').addEventListener('click', function() {
        var mirrors = document.getElementById('set-mirrors').value
            .split('\n')
            .map(function(s) { return s.trim(); })
            .filter(function(s) { return s.length > 0; });

        var data = {
            max_concurrent: parseInt(document.getElementById('set-max-concurrent').value) || 4,
            filename_template: document.getElementById('set-filename-template').value.trim() || defaultSettings.filename_template,
            spoofdpi_enabled: document.getElementById('set-spoofdpi').checked,
            video_quality: document.getElementById('set-quality').value,
            mirrors: mirrors
        };

        fetch('/api/settings', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            showToast(res.message, res.status === 'success' ? 'success' : 'error');
        });
    });

    document.getElementById('resetSettings').addEventListener('click', function() {
        if (!confirm('모든 설정을 기본값으로 복원하시겠습니까?')) return;
        fetch('/api/settings', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(defaultSettings)
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            showToast('기본값으로 복원되었습니다.', 'success');
            loadSettingsUI();
        });
    });
    </script>
</body>
</html>
