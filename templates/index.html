<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissAV Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎬 MissAV Downloader</h1>
        <button id="settingsBtn" class="btn-secondary">⚙️ Settings</button>
    </div>

    <!-- URL Input -->
    <div class="card">
        <div class="url-bar">
            <input type="text" id="urlInput" placeholder="Enter URL or JAV code (e.g., ABP-123)">
            <button id="getInfoBtn">🔍 Get Info</button>
            <button id="batchBtn" class="btn-secondary">📋 Batch Add</button>
        </div>
        <div id="batchPanel" class="hidden">
            <textarea id="batchUrls" class="batch-input" placeholder="Enter one URL or JAV code per line..."></textarea>
            <div class="button-group">
                <button id="addBatchBtn">➕ Add All to Queue</button>
                <button id="cancelBatchBtn" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Video Info -->
    <div class="card" id="infoCard" style="display:none">
        <h3 id="videoTitle">-</h3>
        <p>Code: <span id="videoCode">-</span> | Duration: <span id="videoDuration">-</span></p>
        <div id="previewWarning" class="warning hidden">⚠️ Preview video (short version)</div>
        <div class="quality-row">
            <label>Quality:</label>
            <select id="qualitySelect" class="quality-select"></select>
        </div>
        <div class="button-group">
            <button id="downloadBtn">⬇ Download Now</button>
            <button id="addQueueBtn" class="btn-secondary">➕ Add to Queue</button>
        </div>
    </div>

    <!-- Queue Controls -->
    <div class="card">
        <div class="stats" id="stats"></div>
        <div class="button-group">
            <button id="cleanBtn" class="btn-secondary">🧹 Clean Completed</button>
            <button id="clearBtn" class="btn-danger">🗑 Clear Waiting</button>
        </div>
    </div>

    <!-- Task List -->
    <div class="card">
        <h3>Download Queue</h3>
        <div id="taskList"></div>
    </div>

    <!-- File List -->
    <div class="card">
        <h3>Downloads</h3>
        <input type="text" id="fileSearch" placeholder="Search files..." class="search-input">
        <div id="fileList"></div>
    </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal hidden">
    <div class="modal-content">
        <h3>Settings</h3>
        <div class="setting-group">
            <label>Download Directory:</label>
            <input type="text" id="settingsDownloadDir" class="setting-input">
        </div>
        <div class="setting-group">
            <label class="checkbox-label">
                <input type="checkbox" id="settingsSequentialMode"> Sequential Mode (one at a time)
            </label>
        </div>
        <div class="setting-group">
            <label>Delay between downloads (seconds):</label>
            <input type="number" id="settingsDelay" class="setting-input">
        </div>
        <div class="setting-group">
            <label>Default Quality:</label>
            <select id="settingsQuality" class="setting-input">
                <option value="best">Best</option>
                <option value="1080p">1080p</option>
                <option value="720p">720p</option>
                <option value="480p">480p</option>
            </select>
        </div>
        <div class="setting-group">
            <label>Mirror Domains (one per line):</label>
            <textarea id="settingsMirrors" rows="4" class="setting-textarea"></textarea>
        </div>
        <div class="button-group">
            <button id="saveSettingsBtn">Save</button>
            <button id="closeSettingsBtn" class="btn-secondary">Cancel</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
